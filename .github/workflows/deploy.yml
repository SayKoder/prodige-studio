name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:       ${{ secrets.VPS_HOST }}
          username:   ${{ secrets.VPS_USER }}
          key:        ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /app/prodige-studio

            echo "→ Pull des dernières modifications..."
            git pull origin main

            echo "→ Build et redémarrage des conteneurs..."
            docker compose pull --quiet || true
            docker compose up -d --build --remove-orphans

            echo "→ Attente de la disponibilité de l'app..."
            sleep 10

            echo "→ Migrations Prisma..."
            docker compose exec -T nextjs node node_modules/prisma/build/index.js migrate deploy

            echo "→ Nettoyage des images inutilisées..."
            docker image prune -f

            echo "✓ Déploiement terminé !"
